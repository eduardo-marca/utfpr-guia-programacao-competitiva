site_name: Guia de Programação Competitiva UTFPR

repo_url: https://github.com/eduardo-marca/utfpr-guia-programacao-competitiva
repo_name: utfpr-guia-programacao-competitiva

theme:
  name: material
  logo: assets/logo.svg
  features:
    - navigation.sections
    - navigation.expand
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.footer
    - content.code.copy
  icon:
    repo: fontawesome/brands/git-alt

extra:
  generator: false

markdown_extensions:
  - admonition
  - pymdownx.details

  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  - pymdownx.tabbed:
      alternate_style: true

  - pymdownx.highlight:
      anchor_linenums: true

  - pymdownx.inlinehilite

  - pymdownx.arithmatex:
      generic: true

plugins:
  - search
  - mermaid2

extra_css:
  - stylesheets/style.css

extra_javascript:
  - javascripts/script.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home:
    - index.md
    - introduction/what-is-cp.md
    - Guia do Mkdocs: extra/mkdocs-guide.md

  - Trilha de Aprendizagem: introduction/learning-path.md

  - C++:
    - Básico do C++: cpp/basics.md
    - STL: cpp/stl.md
  
  - Algoritmos Básicos:
    - Busca Binária: algorithms/basic-algorithms/binary-search.md
    - Programação Dinâmica: algorithms/paradigms/dynamic-programming.md

  - Paradigmas:
    - Busca Completa: algorithms/paradigms/complete-search.md
    - Algoritmos Gulosos: algorithms/paradigms/greedy.md
    - Programação Dinâmica: algorithms/paradigms/dynamic-programming.md

  - Grafos:
    - DFS: algorithms/graphs/dfs.md
    - BFS: algorithms/graphs/bfs.md

  - Strings:
    - KMP: algorithms/string/kmp.md

  - Matemática:
    - Combinatória: algorithms/math/combinatorics.md
